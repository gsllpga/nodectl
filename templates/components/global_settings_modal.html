{{define "global_settings_modal.html"}}
<style>
    /* 1. 遮罩层 */
    .gs-modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); 
        backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        z-index: 3000; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
    }
    .gs-modal-overlay.active { display: flex; opacity: 1; }
    
    /* 2. 卡片容器：统一样式 (完全复刻 edit_node_modal 行为) */
    .gs-modal-card {
        background: #ffffff; 
        width: 100%; 
        max-width: 420px; /* 默认窄模式，略大于400确保输入框不挤 */
        height: 60vh; max-height: 700px; /* 固定高度，内部滚动 */
        border-radius: 16px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        transform: scale(0.95); transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        position: relative;
        display: flex; flex-direction: column;
        overflow: hidden; 
    }
    .gs-modal-overlay.active .gs-modal-card { transform: scale(1); }
    
    /* 宽模式触发，展开抽屉 */
    .gs-modal-card.has-content { max-width: 820px; }

    /* 3. 头部 */
    .gs-header { padding: 20px 25px 15px; background: #ffffff; }
    .gs-title { font-size: 18px; color: #1d1d1f; font-weight: 700; }

    /* 4. 中间内容区与双栏网格 */
    .gs-modal-body {
        flex: 1; min-height: 0; width: 100%; padding: 0; 
    }

    .gs-modal-split {
        display: grid; grid-template-columns: 1fr; gap: 0; height: 100%; 
    }
    .gs-modal-card.has-content .gs-modal-split {
        grid-template-columns: 320px 1fr; gap: 0; /* 左侧留够空间放标签和输入框 */
    }

    /* 左侧协议选择栏 */
    .gs-left-col { 
        padding: 25px; border-right: 1px solid transparent; overflow-y: auto;
        scrollbar-width: thin; scrollbar-color: #e5e5ea transparent;
    }
    .gs-left-col::-webkit-scrollbar { width: 6px; }
    .gs-left-col::-webkit-scrollbar-thumb { background: #e5e5ea; border-radius: 4px; }
    
    .gs-modal-card.has-content .gs-left-col { border-right: 1px solid #f5f5f7; }

    /* 右侧配置详情栏 */
    .gs-right-col { 
        display: none; height: 100%; overflow-y: auto; padding: 25px;
        scrollbar-width: thin; scrollbar-color: #e5e5ea transparent;
    }
    .gs-right-col::-webkit-scrollbar { width: 6px; }
    .gs-right-col::-webkit-scrollbar-thumb { background: #e5e5ea; border-radius: 4px; }
    
    .gs-modal-card.has-content .gs-right-col { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 协议选项卡 (左侧Item) */
    .gs-section { margin-bottom: 24px; }
    .section-label { display: block; font-size: 12px; font-weight: 600; color: #86868b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;}

    .proto-nav-card {
        border: 1px solid #e5e5ea; border-radius: 10px; 
        background: #fff; margin-bottom: 12px;
        padding: 10px 14px; user-select: none; cursor: pointer; transition: all 0.2s;
        display: flex; align-items: center; justify-content: space-between;
    }
    .proto-nav-card:last-child { margin-bottom: 0; }
    .proto-nav-card:hover { border-color: #d1d1d6; background: #fafafa; }
    .proto-nav-card.active { border-color: #007aff; background: #f0f7ff; }
    
    .proto-name { font-size: 14px; font-weight: 700; color: #1d1d1f; transition: color 0.2s; }
    .proto-nav-card.active .proto-name { color: #007aff; }

    /* 标签与端口输入 */
    .proto-actions { display: flex; align-items: center; gap: 6px; }
    
    .proto-chip {
        font-size: 11px; font-weight: 800; padding: 2px 6px; border-radius: 6px;
        display: inline-flex; align-items: center; height: 22px; line-height: 1;
    }
    .proto-chip.tcp { color: #007aff; background: #e0f0ff; }
    .proto-chip.udp { color: #f5a623; background: #fff4e0; }

    .port-input {
        width: 58px; padding: 4px; border: 1px solid #e5e5ea; border-radius: 6px;
        font-size: 13px; text-align: center; color: #1d1d1f; font-weight: 600;
        font-family: Menlo, Monaco, "Courier New", monospace;
        outline: none; transition: all 0.2s; background: #f9f9fc;
    }
    .port-input:focus { border-color: #007aff; background: #fff; box-shadow: 0 0 0 2px rgba(0,122,255,0.1); }
    .port-input::-webkit-outer-spin-button, .port-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .port-input[type=number] { -moz-appearance: textfield; }

    /* 展开箭头指示器 */
    .expand-indicator { color: #ccc; transition: all 0.2s; display: flex; align-items: center; margin-left: 2px;}
    .proto-nav-card:hover .expand-indicator { color: #86868b; transform: translateX(2px); }
    .proto-nav-card.active .expand-indicator { color: #007aff; }

    /* 右侧表单内部组件 */
    .gs-field { margin-bottom: 16px; }
    .gs-field:last-child { margin-bottom: 0; }
    .gs-label { display: block; font-size: 12px; font-weight: 600; color: #86868b; margin-bottom: 8px; }
    .gs-input, .gs-select {
        width: 100%; padding: 8px 12px; border: 1px solid #d1d1d6; border-radius: 8px;
        font-size: 13px; color: #1d1d1f; outline: none; transition: border 0.2s; background: #fff;
    }
    .gs-input:focus, .gs-select:focus { border-color: #007aff; }

    .socks5-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* 5. 底部按钮固定栏 */
    .gs-modal-footer { 
        padding: 15px 25px 20px 25px; border-top: 1px solid #eee; background: #fff;
        display: flex; justify-content: flex-end; gap: 12px; z-index: 5;
    }
    .btn-footer-cancel {
        background: #f5f5f7; border: none; color: #666;
        padding: 9px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-footer-cancel:hover { background: #e5e5ea; color: #333; }
    .btn-footer-save {
        background: #007aff; border: none; color: white;
        padding: 9px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-footer-save:hover { background: #0062cc; }

    /* 移动端适配 (对齐 edit_node_modal) */
    @media (max-width: 768px) {
        .gs-modal-card { max-height: 90vh; max-width: 90%; width: 100%; }
        .gs-modal-card.has-content .gs-modal-split { grid-template-columns: 1fr; gap: 0; }
        .gs-modal-split { display: block; overflow-y: auto; }
        .gs-left-col, .gs-right-col { height: auto; overflow: visible; padding: 20px; }
        .gs-left-col { border-right: none; border-bottom: 1px solid #f5f5f7; }
        .socks5-grid { grid-template-columns: 1fr; }
    }
</style>

<div class="gs-modal-overlay" id="globalSettingsModal">
    <div class="gs-modal-card" id="gsModalCard">
        
        <div class="gs-header">
            <div class="gs-title">全局默认参数</div>
        </div>
        
        <div class="gs-modal-body">
            <div class="gs-modal-split">
                
                <div class="gs-left-col">
                    <div class="gs-section">
                        <label class="section-label">选择协议以配置详情</label>
                        
                        <div class="proto-nav-card" onclick="selectGsProto('reality', this)">
                            <div class="proto-name">VLESS Reality</div>
                            <div class="proto-actions">
                                <span class="proto-chip tcp">TCP</span>
                                <input type="number" id="gs_proxy_port_reality" class="port-input" placeholder="端口" onclick="event.stopPropagation()">
                                <div class="expand-indicator"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
                            </div>
                        </div>

                        <div class="proto-nav-card" onclick="selectGsProto('ss', this)">
                            <div class="proto-name">Shadowsocks</div>
                            <div class="proto-actions">
                                <span class="proto-chip tcp">TCP</span>
                                <span class="proto-chip udp">UDP</span>
                                <input type="number" id="gs_proxy_port_ss" class="port-input" placeholder="端口" onclick="event.stopPropagation()">
                                <div class="expand-indicator"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
                            </div>
                        </div>

                        <div class="proto-nav-card" onclick="selectGsProto('hy2', this)">
                            <div class="proto-name">Hysteria2</div>
                            <div class="proto-actions">
                                <span class="proto-chip udp">UDP</span>
                                <input type="number" id="gs_proxy_port_hy2" class="port-input" placeholder="端口" onclick="event.stopPropagation()">
                                <div class="expand-indicator"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
                            </div>
                        </div>

                        <div class="proto-nav-card" onclick="selectGsProto('tuic', this)">
                            <div class="proto-name">TUIC</div>
                            <div class="proto-actions">
                                <span class="proto-chip udp">UDP</span>
                                <input type="number" id="gs_proxy_port_tuic" class="port-input" placeholder="端口" onclick="event.stopPropagation()">
                                <div class="expand-indicator"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
                            </div>
                        </div>

                        <div class="proto-nav-card" onclick="selectGsProto('socks5', this)">
                            <div class="proto-name">Socks5</div>
                            <div class="proto-actions">
                                <span class="proto-chip tcp">TCP</span>
                                <span class="proto-chip udp">UDP</span>
                                <input type="number" id="gs_proxy_port_socks5" class="port-input" placeholder="端口" onclick="event.stopPropagation()">
                                <div class="expand-indicator"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="gs-right-col" id="gsRightCol">
                    <div class="gs-section">
                        <label class="section-label" id="gsRightTitle">协议配置</label>
                        
                        <div class="proto-form" id="gs-form-reality" style="display:none;">
                            <div class="gs-field">
                                <label class="gs-label">目标伪装域名 (SNI)</label>
                                <input type="text" id="gs_proxy_reality_sni" class="gs-input" placeholder="www.bing.com">
                            </div>
                        </div>

                        <div class="proto-form" id="gs-form-ss" style="display:none;">
                            <div class="gs-field">
                                <label class="gs-label">加密方式</label>
                                <select id="gs_proxy_ss_method" class="gs-select">
                                    <option value="aes-128-gcm">AES-128-GCM</option>
                                    <option value="2022-blake3-aes-128-gcm">2022-blake3-aes-128-gcm</option>
                                    <option value="chacha20-ietf-poly1305">ChaCha20-IETF-Poly1305</option>
                                </select>
                            </div>
                        </div>

                        <div class="proto-form" id="gs-form-hy2" style="display:none;">
                            <div style="font-size: 13px; color: #86868b; text-align: center; padding: 50px 0;">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; margin-bottom: 10px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                                <br>该协议暂无额外参数配置
                            </div>
                        </div>

                        <div class="proto-form" id="gs-form-tuic" style="display:none;">
                            <div style="font-size: 13px; color: #86868b; text-align: center; padding: 50px 0;">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; margin-bottom: 10px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                                <br>该协议暂无额外参数配置
                            </div>
                        </div>

                        <div class="proto-form" id="gs-form-socks5" style="display:none;">
                            <div class="socks5-grid">
                                <div class="gs-field" style="margin: 0;">
                                    <label class="gs-label">默认账号</label>
                                    <input type="text" id="gs_proxy_socks5_user" class="gs-input" placeholder="admin">
                                </div>
                                <div class="gs-field" style="margin: 0;">
                                    <label class="gs-label">默认密码</label>
                                    <input type="text" id="gs_proxy_socks5_pass" class="gs-input" placeholder="123456">
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div>

            </div>
        </div>

        <div class="gs-modal-footer">
            <button class="btn-footer-cancel" onclick="closeGlobalSettingsModal()">取消</button>
            <button class="btn-footer-save" onclick="saveGlobalSettings()" id="btnSaveGs">保存配置</button>
        </div>
    </div>
</div>

<script>
    const gsModal = document.getElementById('globalSettingsModal');
    const gsModalCard = document.getElementById('gsModalCard');

    // 协议卡片点击切换逻辑
    function selectGsProto(protoId, cardElement) {
        const isAlreadyActive = cardElement.classList.contains('active');
        
        // 1. 初始化：清除所有激活状态，隐藏所有右侧表单
        document.querySelectorAll('.proto-nav-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.proto-form').forEach(f => f.style.display = 'none');
        
        if (isAlreadyActive) {
            // 2. 如果点击的是已激活的，则收起弹窗(恢复窄模式)
            gsModalCard.classList.remove('has-content');
        } else {
            // 3. 如果点击了新项目，为其激活并展开弹窗
            cardElement.classList.add('active');
            
            // 动态更新右侧小标题使其呼应
            const protoName = cardElement.querySelector('.proto-name').innerText;
            document.getElementById('gsRightTitle').innerText = protoName + ' 额外配置';
            
            document.getElementById('gs-form-' + protoId).style.display = 'block';
            gsModalCard.classList.add('has-content');
            
            // 移动端体验优化：激活后平滑向下滚动至详情区域
            if (window.innerWidth <= 768) {
                setTimeout(() => {
                    const rightCol = document.getElementById('gsRightCol');
                    rightCol.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 50);
            }
        }
    }

    // 打开弹窗及后端数据拉取
    async function openGlobalSettingsModal() {
        gsModal.classList.add('active');
        const btnSave = document.getElementById('btnSaveGs');
        btnSave.innerText = "加载中...";
        btnSave.disabled = true;

        // 【关键修复】确保弹窗在每次打开时均是最干净的收起(窄)模式
        gsModalCard.classList.remove('has-content');
        document.querySelectorAll('.proto-nav-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.proto-form').forEach(f => f.style.display = 'none');

        try {
            const res = await fetch('/api/get-settings');
            const result = await res.json();
            if(result.status === 'success') {
                const data = result.data;
                document.getElementById('gs_proxy_port_ss').value = data.proxy_port_ss || '';
                
                // 动态构建下拉框（若配置的加密项不在原列表中则自动加入）
                const ssMethodSelect = document.getElementById('gs_proxy_ss_method');
                if(data.proxy_ss_method) {
                    const optionExists = Array.from(ssMethodSelect.options).some(opt => opt.value === data.proxy_ss_method);
                    if(!optionExists) {
                        const newOpt = new Option(data.proxy_ss_method, data.proxy_ss_method);
                        ssMethodSelect.add(newOpt);
                    }
                    ssMethodSelect.value = data.proxy_ss_method;
                }

                document.getElementById('gs_proxy_port_hy2').value = data.proxy_port_hy2 || '';
                document.getElementById('gs_proxy_port_tuic').value = data.proxy_port_tuic || '';
                document.getElementById('gs_proxy_port_reality').value = data.proxy_port_reality || '';
                document.getElementById('gs_proxy_reality_sni').value = data.proxy_reality_sni || '';
                document.getElementById('gs_proxy_port_socks5').value = data.proxy_port_socks5 || '';
                document.getElementById('gs_proxy_socks5_user').value = data.proxy_socks5_user || '';
                document.getElementById('gs_proxy_socks5_pass').value = data.proxy_socks5_pass || '';
            }
        } catch(e) {
            console.error("加载配置失败", e);
        } finally {
            btnSave.innerText = "保存配置";
            btnSave.disabled = false;
        }
    }

    // 关闭弹窗
    function closeGlobalSettingsModal() {
        gsModal.classList.remove('active');
        // 稍微延时等待渐隐后重置大小，防止关闭瞬间变窄
        setTimeout(() => {
            gsModalCard.classList.remove('has-content');
        }, 300);
    }

    // 提交保存修改
    async function saveGlobalSettings() {
        const payload = {
            "proxy_port_ss": document.getElementById('gs_proxy_port_ss').value,
            "proxy_ss_method": document.getElementById('gs_proxy_ss_method').value,
            "proxy_port_hy2": document.getElementById('gs_proxy_port_hy2').value,
            "proxy_port_tuic": document.getElementById('gs_proxy_port_tuic').value,
            "proxy_port_reality": document.getElementById('gs_proxy_port_reality').value,
            "proxy_reality_sni": document.getElementById('gs_proxy_reality_sni').value,
            "proxy_port_socks5": document.getElementById('gs_proxy_port_socks5').value,
            "proxy_socks5_user": document.getElementById('gs_proxy_socks5_user').value,
            "proxy_socks5_pass": document.getElementById('gs_proxy_socks5_pass').value
        };

        const btnSave = document.getElementById('btnSaveGs');
        btnSave.innerText = "保存中...";
        btnSave.disabled = true;

        try {
            const response = await fetch('/api/update-settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.status === 'success') {
                closeGlobalSettingsModal();
            } else {
                alert("保存失败: " + result.message);
            }
        } catch (error) {
            alert('网络错误，请稍后重试');
        } finally {
            btnSave.innerText = "保存配置";
            btnSave.disabled = false;
        }
    }
</script>
{{end}}
