{{define "pwd_modal.html"}}
<style>
    /* 1. 容器与遮罩层 (与 add_node_modal 保持一致，仅改类名前缀) */
    .pwd-modal-overlay {
        display: none; 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); 
        backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        z-index: 2000; 
        align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
    }
    .pwd-modal-overlay.active { display: flex; opacity: 1; }
    
    .pwd-modal-card {
        background: #ffffff; 
        width: 100%; max-width: 400px; /* 统一宽度 */
        padding: 28px; /* 统一内边距 */
        border-radius: 20px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        text-align: left; /* 统一左对齐 */
    }
    .pwd-modal-overlay.active .pwd-modal-card { transform: scale(1); }

    /* 2. 内部样式 (复制 add_node_modal 的风格) */
    .pwd-modal-header { margin-bottom: 20px; }
    .pwd-modal-header h3 { font-size: 20px; font-weight: 700; color: #1d1d1f; margin: 0; }

    .pwd-input-group { margin-bottom: 16px; }
    .pwd-input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #666; }

    .pwd-input-group input {
        width: 100%; padding: 12px 14px;
        font-size: 15px; border: 1px solid #d1d1d6;
        border-radius: 10px; outline: none; transition: border 0.2s;
        box-sizing: border-box; 
    }
    .pwd-input-group input:focus { border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }

    /* 3. 按钮区 (统一改为靠右对齐，大小一致) */
    .pwd-modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    
    .btn-pwd-cancel {
        background: #f5f5f7; color: #1d1d1f; border: none;
        padding: 10px 20px; border-radius: 8px;
        font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .btn-pwd-cancel:hover { background: #e5e5ea; }

    .btn-pwd-submit {
        background: #007aff; color: white; border: none;
        padding: 10px 20px; border-radius: 8px;
        font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .btn-pwd-submit:hover { background: #0062cc; }
    .btn-pwd-submit:disabled { background: #ccc; cursor: not-allowed; }

    /* 消息提示 */
    .pwd-msg-box { 
        padding: 12px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; 
        display: none; 
    }
    .msg-error { background: #fff0f0; color: #e30000; animation: shake 0.4s; }
    .msg-success { background: #e8f5e9; color: #34c759; }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
    }
</style>

<div class="pwd-modal-overlay" id="pwdModal">
    <div class="pwd-modal-card">
        <div class="pwd-modal-header">
            <h3>修改管理员密码</h3>
        </div>
        
        <div id="pwdMsg" class="pwd-msg-box"></div>
        
        <form id="pwdForm" onsubmit="submitPwdChange(event)">
            <div class="pwd-input-group">
                <label>当前密码</label>
                <input type="password" id="oldPwd" placeholder="" required>
            </div>
            
            <div class="pwd-input-group">
                <label>新密码</label>
                <input type="password" id="newPwd" placeholder="设置新的管理员密码" required minlength="5">
            </div>
            
            <div class="pwd-input-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPwd" placeholder="请再次输入新密码" required minlength="5">
            </div>

            <div class="pwd-modal-actions">
                <button type="button" class="btn-pwd-cancel" onclick="closePwdModal()">取消</button>
                <button type="submit" class="btn-pwd-submit" id="pwdSubmitBtn">确认修改</button>
            </div>
        </form>
    </div>
</div>

<script>
    const pwdModalEl = document.getElementById('pwdModal');
    
    pwdModalEl.addEventListener('click', function(e) {
        if (e.target === pwdModalEl) closePwdModal();
    });

    function openPwdModal() {
        pwdModalEl.classList.add('active');
        document.getElementById('pwdMsg').style.display = 'none';
        document.getElementById('pwdForm').reset();
        
        // 临时隐藏右上角菜单防止 z-index 遮挡
        const dropdown = document.querySelector('.dropdown-content');
        if(dropdown) {
            dropdown.style.display = 'none';
            setTimeout(() => { dropdown.style.display = ''; }, 100);
        }
    }

    function closePwdModal() {
        pwdModalEl.classList.remove('active');
    }

    async function submitPwdChange(e) {
        e.preventDefault();
        const btn = document.getElementById('pwdSubmitBtn');
        const oldPwd = document.getElementById('oldPwd').value;
        const newPwd = document.getElementById('newPwd').value;
        const confirmPwd = document.getElementById('confirmPwd').value;

        if (newPwd !== confirmPwd) {
            showPwdMsg('error', '两次输入的新密码不一致');
            return;
        }

        btn.disabled = true;
        btn.innerText = '提交中...';

        try {
            const response = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ old_password: oldPwd, new_password: newPwd, confirm_password: confirmPwd })
            });
            const data = await response.json();
            
            if (data.status === 'success') {
                showPwdMsg('success', data.message);
                setTimeout(() => { window.location.href = '/login'; }, 1500);
            } else {
                showPwdMsg('error', data.message);
                btn.disabled = false;
                btn.innerText = '确认修改';
            }
        } catch (err) {
            showPwdMsg('error', '网络请求失败');
            btn.disabled = false;
            btn.innerText = '确认修改';
        }
    }

    function showPwdMsg(type, text) {
        const msgBox = document.getElementById('pwdMsg');
        msgBox.classList.remove('msg-error', 'msg-success');
        void msgBox.offsetWidth; // 触发重绘以支持动画
        msgBox.style.display = 'block';
        msgBox.classList.add('msg-' + type);
        msgBox.innerText = text;
    }
</script>
{{end}}
