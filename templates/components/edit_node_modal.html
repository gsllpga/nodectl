{{define "edit_node_modal.html"}}
<script>
    const GLOBAL_SUPPORTED_PROTOCOLS = {{.Protocols}};
</script>

<style>
    /* 1. 遮罩层 */
    .edit-modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); 
        backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        z-index: 2000; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
    }
    .edit-modal-overlay.active { display: flex; opacity: 1; }
    
    /* 2. 卡片容器 */
    .edit-modal-card {
        background: #ffffff; 
        width: 100%; 
        max-width: 400px; /* 默认窄模式 */
        height: 60vh; max-height: 700px;
        border-radius: 16px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        transform: scale(0.95); transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        position: relative;
        display: flex; flex-direction: column; 
        overflow: hidden; 
    }
    .edit-modal-overlay.active .edit-modal-card { transform: scale(1); }
    .edit-modal-card.has-content { max-width: 820px; }

    /* 3. 中间内容区 */
    .edit-modal-body {
        flex: 1; min-height: 0; width: 100%; padding: 0;
    }
    #editNodeForm { height: 100%; display: flex; flex-direction: column; }

    .edit-modal-split {
        display: grid; grid-template-columns: 1fr; gap: 0; height: 100%; 
    }
    .edit-modal-card.has-content .edit-modal-split {
        grid-template-columns: 260px 1fr; gap: 0;
    }

    /* 左侧 */
    .edit-left-col { 
        padding: 25px;
        border-right: 1px solid transparent;
        overflow-y: auto;
    }
    .edit-modal-card.has-content .edit-left-col { border-right: 1px solid #f5f5f7; }

    /* 右侧 */
    .edit-right-col { 
        display: none; height: 100%; overflow-y: auto; padding: 25px;
        scrollbar-width: thin; scrollbar-color: #e5e5ea transparent;
    }
    .edit-right-col::-webkit-scrollbar { width: 6px; }
    .edit-right-col::-webkit-scrollbar-thumb { background: #e5e5ea; border-radius: 4px; }
    .edit-right-col::-webkit-scrollbar-track { background: transparent; }
    .edit-modal-card.has-content .edit-right-col { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 4. 组件样式 */
    .edit-section { margin-bottom: 24px; }
    .section-label { display: block; font-size: 12px; font-weight: 600; color: #86868b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}

    .title-input {
        width: 100%; padding: 8px 0; font-size: 18px; font-weight: 700;
        border: none; border-bottom: 1px solid #e1e1e8; border-radius: 0;
        outline: none; transition: border 0.2s; color: #1d1d1f; background: transparent;
    }
    .title-input:focus { border-color: #007aff; }
    .title-input::placeholder { color: #ccc; font-weight: 400; }

    /* [新增] IP 输入框样式 */
    .ip-input {
        width: 100%; padding: 6px 0; font-size: 14px; font-weight: 500; font-family: monospace;
        border: none; border-bottom: 1px solid #e1e1e8; border-radius: 0;
        outline: none; transition: border 0.2s; color: #333; background: transparent;
    }
    .ip-input:focus { border-color: #007aff; }
    .ip-input::placeholder { color: #ccc; font-weight: 400; font-family: -apple-system, sans-serif; }

    /* [新增] 添加IP的小链接样式 */
    .add-ip-link {
        font-size: 11px; color: #007aff; cursor: pointer; display: inline-block; margin-top: 4px; text-decoration: none;
    }
    .add-ip-link:hover { text-decoration: underline; }

    /* 路由类型 */
    .segmented-control {
        background: #f5f5f7; padding: 4px; border-radius: 10px; display: flex; gap: 4px;
    }
    .segment-option {
        flex: 1; text-align: center; padding: 8px 0; 
        font-size: 13px; color: #666; cursor: pointer; 
        border-radius: 8px; transition: all 0.2s; font-weight: 600;
    }
    .segment-option:hover { color: #333; }
    .segment-option.active { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .segment-option.active[data-type="1"] { color: #34c759; }
    .segment-option.active[data-type="2"] { color: #f5a623; }
    .segment-option.active[data-type="3"] { color: #d74242; }

    /* 协议卡片 */
    .protocol-card {
        border: 1px solid #e5e5ea; border-radius: 10px; 
        background: #fff; margin-bottom: 12px;
        overflow: hidden; transition: all 0.2s;
    }
    .protocol-card:hover { border-color: #d1d1d6; }
    .protocol-card.disabled { opacity: 0.6; background: #f9f9fc; }

    .card-header-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 12px; background: #fff; 
        border-bottom: 1px solid #f5f5f7;
    }
    .protocol-card.disabled .card-header-row { border-bottom: none; }

    .protocol-tag { font-size: 13px; font-weight: 800; color: #1d1d1f; text-transform: uppercase; }
    .card-actions { display: flex; align-items: center; gap: 10px; }

    /* 开关 */
    .toggle-switch { position: relative; width: 34px; height: 18px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
        position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
        background-color: #e5e5ea; transition: .3s; border-radius: 18px;
    }
    .toggle-slider:before {
        position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px;
        background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }
    input:checked + .toggle-slider { background-color: #34c759; } 
    input:checked + .toggle-slider:before { transform: translateX(16px); }

    /* 删除按钮 */
    .btn-delete-text {
        border: none; background: transparent; color: #86868b; 
        font-size: 12px; font-weight: 500; cursor: pointer; 
        transition: all 0.2s; padding: 2px 6px; border-radius: 4px;
    }
    .btn-delete-text:hover { color: #d74242; background: rgba(215, 66, 66, 0.08); }
    .btn-delete-text.confirm-state { color: #fff; background: #d74242; }

    .card-body-row { padding: 0; display: block; }
    
    .protocol-textarea {
        width: 100%; border: none; 
        padding: 8px 12px; 
        font-size: 11px; line-height: 1.4; color: #333;
        font-family: Menlo, Monaco, "Courier New", monospace; 
        background: transparent; outline: none;
        resize: none; overflow: hidden; min-height: 36px;
        white-space: pre-wrap; word-break: break-all; overflow-wrap: break-word;
    }
    .protocol-textarea:focus { background: #fafafa; }

    /* 左侧添加按钮 */
    .btn-add-protocol-left {
        width: 100%; padding: 12px; border: 1px dashed #007aff; border-radius: 10px;
        background: #f0f7ff; color: #007aff; font-size: 13px; font-weight: 600;
        cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-add-protocol-left:hover { background: #e0efff; }

    /* 5. 底部按钮 */
    .edit-modal-footer { 
        padding: 15px 25px 20px 25px; 
        border-top: 1px solid #eee; background: #fff;
        display: flex; justify-content: flex-end; gap: 12px; 
        z-index: 5;
    }
    .btn-footer-cancel {
        background: #f5f5f7; border: none; color: #666;
        padding: 9px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-footer-cancel:hover { background: #e5e5ea; }
    .btn-footer-save {
        background: #007aff; border: none; color: white;
        padding: 9px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-footer-save:hover { background: #0062cc; }

    @media (max-width: 768px) {
        .edit-modal-card { max-height: 90vh; }
        .edit-modal-card.has-content .edit-modal-split { grid-template-columns: 1fr; gap: 0; }
        .edit-modal-split { display: block; overflow-y: auto; }
        .edit-left-col, .edit-right-col { height: auto; overflow: visible; padding: 20px; }
        .edit-left-col { border-right: none; border-bottom: 1px solid #f5f5f7; }
    }
</style>

<div class="edit-modal-overlay" id="editNodeModal">
    <div class="edit-modal-card" id="editModalCard">
        
        <div class="edit-modal-body">
            <form id="editNodeForm" onsubmit="submitEditNode(event)">
                <input type="hidden" id="editNodeUUID">
                
                <div class="edit-modal-split">
                    <div class="edit-left-col">
                        <div class="edit-section">
                            <label class="section-label">节点名称</label>
                            <input type="text" id="editNodeName" class="title-input" placeholder="例如：独角鲸-香港" required>
                        </div>

                        <div class="edit-section">
                            <label class="section-label">路由类型</label>
                            <div class="segmented-control">
                                <div class="segment-option" data-type="1" onclick="selectEditGroup(1)">直连</div>
                                <div class="segment-option" data-type="2" onclick="selectEditGroup(2)">落地</div>
                                <div class="segment-option" data-type="3" onclick="selectEditGroup(3)">屏蔽</div>
                            </div>
                            <input type="hidden" id="editNodeUIState">
                        </div>

                        <div id="ipEditContainer"></div>

                        <div class="edit-section">
                            <button type="button" class="btn-add-protocol-left" onclick="showAddProtocolMenu()">
                                <span>+</span> 添加协议
                            </button>
                        </div>
                    </div>

                    <div class="edit-right-col">
                        <div id="protocolRowsContainer"></div>
                    </div>
                </div>
            </form>
        </div>

        <div class="edit-modal-footer">
            <button type="button" class="btn-footer-cancel" onclick="closeEditModal()">取消</button>
            <button type="button" class="btn-footer-save" onclick="submitEditNode(event)">保存更改</button>
        </div>
    </div>
</div>

<div id="protoSelectOverlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; z-index: 2100; justify-content:center; align-items:center; background:rgba(0,0,0,0.05);" onclick="this.style.display='none'">
    <div id="protoSelectList" style="background:white; padding:10px; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.2); width: 200px; display:flex; flex-direction:column; gap:4px; animation: popIn 0.15s;" onclick="event.stopPropagation()">
        </div>
</div>

<script>
    const editModalEl = document.getElementById('editNodeModal');
    const editModalCard = document.getElementById('editModalCard');
    const container = document.getElementById('protocolRowsContainer');
    let originalRoutingType = 1; 

    function openEditModal(uuid) {
        const node = window.allNodesData[uuid];
        if (!node) { alert('数据加载异常，请刷新'); return; }

        document.getElementById('editNodeUUID').value = node.uuid;
        document.getElementById('editNodeName').value = node.name;
        
        // 路由类型处理
        if (!node.is_blocked) {
            originalRoutingType = node.routing_type;
        } else {
            originalRoutingType = node.routing_type || 1;
        }
        let uiState = node.is_blocked ? 3 : node.routing_type;
        selectEditGroup(uiState);

        // [新增] 动态渲染 IP 地址输入框
        renderIPInputs(node.ipv4, node.ipv6);

        // 协议列表处理
        container.innerHTML = ''; 
        const disabledSet = new Set(node.disabled_links || []);

        if (node.links && Object.keys(node.links).length > 0) {
            for (const [proto, link] of Object.entries(node.links)) {
                const isEnabled = !disabledSet.has(proto);
                renderProtocolCard(proto, link, isEnabled);
            }
        }
        
        updateLayoutState();
        editModalEl.classList.add('active');
    }

    // [新增] 渲染 IP 输入框的逻辑函数
    function renderIPInputs(ipv4, ipv6) {
        const container = document.getElementById('ipEditContainer');
        const v4 = ipv4 || '';
        const v6 = ipv6 || '';
        
        let html = '';

        // 定义输入框的 HTML 模板
        const v4Html = `
            <div class="edit-section" id="section-ipv4" style="margin-bottom: 12px;">
                <label class="section-label">IPv4 地址</label>
                <input type="text" id="editNodeIPV4" class="ip-input" value="${v4}" placeholder="x.x.x.x">
            </div>`;
            
        const v6Html = `
            <div class="edit-section" id="section-ipv6" style="margin-bottom: 12px;">
                <label class="section-label">IPv6 地址</label>
                <input type="text" id="editNodeIPV6" class="ip-input" value="${v6}" placeholder="::1">
            </div>`;

        // 逻辑判断：
        // 1. 如果都有值，显示两个
        if (v4 && v6) {
            html = v4Html + v6Html;
        } 
        // 2. 如果只有 IPv4 (或都为空)
        else if ((v4 && !v6) || (!v4 && !v6)) {
            html = v4Html + `<div style="text-align:right; margin-top:-15px; margin-bottom:15px;"><a class="add-ip-link" onclick="appendIPField('v6')">+ 添加 IPv6</a></div>`;
        }
        // 3. 如果只有 IPv6
        else if (!v4 && v6) {
            html = v6Html + `<div style="text-align:right; margin-top:-15px; margin-bottom:15px;"><a class="add-ip-link" onclick="appendIPField('v4')">+ 添加 IPv4</a></div>`;
        }

        container.innerHTML = html;
    }

    // [新增] 只有在单显模式下点击链接才会触发，用于追加显示另一个输入框
    function appendIPField(type) {
        const container = document.getElementById('ipEditContainer');
        const links = container.querySelectorAll('.add-ip-link');
        links.forEach(l => l.parentElement.remove()); // 移除所有"添加"链接

        // 获取当前已有的值，防止覆盖
        const v4El = document.getElementById('editNodeIPV4');
        const v6El = document.getElementById('editNodeIPV6');
        const currentV4 = v4El ? v4El.value : '';
        const currentV6 = v6El ? v6El.value : '';

        // 强制重新渲染为双显模式
        // 这里 trick 一下：传入非空字符串（如果是 null）来强制 renderIPInputs 认为它有值
        // 但实际上 value 属性还是要填写真实值
        
        // 简单粗暴做法：手动插入缺少的那个 HTML
        if (type === 'v6' && !document.getElementById('editNodeIPV6')) {
            const v6Html = `
                <div class="edit-section" id="section-ipv6" style="margin-bottom: 12px; animation: fadeIn 0.3s;">
                    <label class="section-label">IPv6 地址</label>
                    <input type="text" id="editNodeIPV6" class="ip-input" value="" placeholder="::1">
                </div>`;
            container.insertAdjacentHTML('beforeend', v6Html);
        } else if (type === 'v4' && !document.getElementById('editNodeIPV4')) {
             const v4Html = `
                <div class="edit-section" id="section-ipv4" style="margin-bottom: 12px; animation: fadeIn 0.3s;">
                    <label class="section-label">IPv4 地址</label>
                    <input type="text" id="editNodeIPV4" class="ip-input" value="" placeholder="x.x.x.x">
                </div>`;
            container.insertAdjacentHTML('afterbegin', v4Html);
        }
    }

    function closeEditModal() {
        editModalEl.classList.remove('active');
        setTimeout(() => { editModalCard.classList.remove('has-content'); }, 200);
    }

    function updateLayoutState() {
        if (container.children.length > 0) {
            editModalCard.classList.add('has-content');
        } else {
            editModalCard.classList.remove('has-content');
        }
    }

    function selectEditGroup(val) {
        document.getElementById('editNodeUIState').value = val;
        document.querySelectorAll('.segment-option').forEach(el => {
            el.classList.remove('active');
            if (parseInt(el.getAttribute('data-type')) === val) el.classList.add('active');
        });
        if (val === 1 || val === 2) originalRoutingType = val;
    }

    function autoResizeTextarea(el) {
        el.style.height = 'auto'; 
        el.style.height = (el.scrollHeight) + 'px';
    }

    function showAddProtocolMenu() {
        const listEl = document.getElementById('protoSelectList');
        listEl.innerHTML = '<div style="font-size:11px; color:#999; margin-bottom:4px; padding-left:6px;">选择协议</div>';
        
        const existingProtos = new Set();
        container.querySelectorAll('.protocol-card').forEach(card => {
            existingProtos.add(card.getAttribute('data-proto'));
        });

        const availableProtos = GLOBAL_SUPPORTED_PROTOCOLS.filter(p => !existingProtos.has(p));

        if (availableProtos.length === 0) {
            alert('所有协议已添加');
            return;
        }

        availableProtos.forEach(proto => {
            const item = document.createElement('div');
            item.innerText = proto;
            item.style.padding = '8px 12px';
            item.style.cursor = 'pointer';
            item.style.borderRadius = '6px';
            item.style.fontSize = '13px';
            item.style.fontWeight = '600';
            item.style.color = '#333';
            item.onmouseover = () => item.style.background = '#f5f5f7';
            item.onmouseout = () => item.style.background = 'white';
            item.onclick = () => {
                insertProtocolCard(proto);
                document.getElementById('protoSelectOverlay').style.display = 'none';
            };
            listEl.appendChild(item);
        });

        document.getElementById('protoSelectOverlay').style.display = 'flex';
    }

    function insertProtocolCard(proto) {
        renderProtocolCard(proto, '', true);
        updateLayoutState();
    }

    function renderProtocolCard(proto, linkValue, isEnabled) {
        const div = document.createElement('div');
        div.className = `protocol-card ${isEnabled ? '' : 'disabled'}`;
        div.setAttribute('data-proto', proto);

        const checkedAttr = isEnabled ? 'checked' : '';
        const bodyDisplay = isEnabled ? 'block' : 'none';

        const safeValue = linkValue ? linkValue.trim() : '';

        div.innerHTML = `
            <div class="card-header-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <span class="protocol-tag">${proto}</span>
                </div>
                <div class="card-actions">
                    <label class="toggle-switch">
                        <input type="checkbox" class="proto-enable-check" ${checkedAttr} onchange="toggleCardState(this)">
                        <span class="toggle-slider"></span>
                    </label>
                    <button type="button" class="btn-delete-text" onclick="handleDeleteClick(this)">删除</button>
                </div>
            </div>
            <div class="card-body-row" style="display: ${bodyDisplay};">
                <textarea class="protocol-textarea" 
                          oninput="autoResizeTextarea(this)"
                          placeholder="粘贴 ${proto}:// 链接..." spellcheck="false">${safeValue}</textarea>
            </div>
        `;
        container.appendChild(div);
        
        const textarea = div.querySelector('textarea');
        setTimeout(() => autoResizeTextarea(textarea), 0);
    }

    window.toggleCardState = function(checkbox) {
        const card = checkbox.closest('.protocol-card');
        const body = card.querySelector('.card-body-row');
        if (checkbox.checked) {
            card.classList.remove('disabled');
            body.style.display = 'block';
            const textarea = body.querySelector('textarea');
            autoResizeTextarea(textarea);
        } else {
            card.classList.add('disabled');
            body.style.display = 'none';
        }
    }

    window.handleDeleteClick = function(btn) {
        if (btn.dataset.confirmState === 'true') {
            btn.closest('.protocol-card').remove();
            updateLayoutState();
        } else {
            btn.dataset.confirmState = 'true';
            btn.innerText = '确认删除?';
            btn.classList.add('confirm-state');
            
            btn.resetTimer = setTimeout(() => {
                btn.dataset.confirmState = 'false';
                btn.innerText = '删除';
                btn.classList.remove('confirm-state');
            }, 3000);
        }
    }

    async function submitEditNode(e) {
        if(e) e.preventDefault();
        
        const uuid = document.getElementById('editNodeUUID').value;
        const name = document.getElementById('editNodeName').value;
        const uiState = parseInt(document.getElementById('editNodeUIState').value);
        
        // [新增] 获取 IP 地址值 (如果元素不存在则为空)
        const v4El = document.getElementById('editNodeIPV4');
        const v6El = document.getElementById('editNodeIPV6');
        const ipv4 = v4El ? v4El.value.trim() : "";
        const ipv6 = v6El ? v6El.value.trim() : "";

        let finalRoutingType = 1;
        let finalIsBlocked = false;
        if (uiState === 3) {
            finalIsBlocked = true;
            finalRoutingType = originalRoutingType; 
        } else {
            finalIsBlocked = false;
            finalRoutingType = uiState;
        }
        
        const links = {};
        const disabledLinks = []; 

        const cards = container.querySelectorAll('.protocol-card');
        cards.forEach(card => {
            const proto = card.getAttribute('data-proto');
            const input = card.querySelector('.protocol-textarea');
            const toggle = card.querySelector('.proto-enable-check');
            
            const linkVal = input.value.trim();
            if (linkVal) {
                links[proto] = linkVal; 
                if (!toggle.checked) {
                    disabledLinks.push(proto);
                }
            }
        });

        try {
            const response = await fetch('/api/update-node', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    uuid, name, 
                    routing_type: finalRoutingType, 
                    links, 
                    is_blocked: finalIsBlocked,
                    disabled_links: disabledLinks,
                    ipv4, ipv6 // [新增] 发送 IP 字段
                })
            });
            const res = await response.json();
            
            if (res.status === 'success') {
                closeEditModal();
                loadNodesList(); 
            } else {
                alert('保存失败: ' + res.message);
            }
        } catch (err) {
            alert('网络请求错误');
        }
    }
</script>
{{end}}
