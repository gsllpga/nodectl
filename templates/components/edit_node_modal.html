{{define "edit_node_modal.html"}}
<script>
    const GLOBAL_SUPPORTED_PROTOCOLS = {{.Protocols}};
</script>

<style>
    /* ================= 统一弹窗基础框架 ================= */
    .edit-modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        z-index: 2000; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
    }
    .edit-modal-overlay.active { display: flex; opacity: 1; }
    
    /* [优化] 窄模式调整为 360px，展开后依然 800px，释放右侧空间 */
    .edit-modal-card {
        background: #ffffff; width: 100%; max-width: 380px; height: 550px; border-radius: 12px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden;
        transition: max-width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .edit-modal-card.has-content { max-width: 800px; }

    /* 统一 Header 样式 */
    .edit-header { 
        background: #f5f5f7; border-bottom: 1px solid #e5e5ea; 
        padding: 15px 20px 15px 25px; display: flex; align-items: center; justify-content: space-between; 
    }
    .edit-title { font-size: 15px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; margin: 0; }

    /* 隐藏滚动条全局类 */
    .no-scrollbar { overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* 主内容区 & 表单容器 */
    .edit-form-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .edit-body { flex: 1; display: flex; flex-direction: row; background: #fff; overflow: hidden; }

    /* ================= 左侧面板 (调整为 360px) ================= */
    .edit-left-col {
        width: 380px; flex-shrink: 0; padding: 25px;
        border-right: 1px solid transparent; transition: border-color 0.3s;
    }
    .edit-modal-card.has-content .edit-left-col { border-right-color: #f5f5f7; }

    .edit-section { margin-bottom: 24px; }
    .section-label { display: block; font-size: 13px; font-weight: 600; color: #888; margin-bottom: 10px; }

    .title-input {
        width: 100%; padding: 8px 12px; font-size: 15px; font-weight: 600;
        border: 1px solid #d1d1d6; border-radius: 8px;
        outline: none; transition: border 0.2s; color: #1d1d1f; background: #fafbfc;
    }
    .title-input:focus { border-color: #007aff; background: #fff; box-shadow: 0 0 0 2px rgba(0,122,255,0.1); }
    .title-input::placeholder { color: #ccc; font-weight: 400; }

    /* 路由类型分段控制器 */
    .segmented-control {
        background: #f5f5f7; padding: 4px; border-radius: 8px; display: flex; gap: 4px; border: 1px solid #e5e5ea;
    }
    .segment-option {
        flex: 1; text-align: center; padding: 8px 0; 
        font-size: 13px; color: #666; cursor: pointer; 
        border-radius: 6px; transition: all 0.2s; font-weight: 600;
    }
    .segment-option:hover { color: #333; }
    .segment-option.active { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .segment-option.active[data-type="1"] { color: #34c759; } 
    .segment-option.active[data-type="2"] { color: #f5a623; } 
    .segment-option.active[data-type="3"] { color: #d74242; } 

    /* IP 输入框样式 */
    .ip-input {
        width: 100%; padding: 10px 12px; font-size: 13px; font-weight: 500; font-family: monospace;
        border: 1px solid #d1d1d6; border-radius: 8px;
        outline: none; transition: border 0.2s; color: #333; background: #fafbfc;
    }
    .ip-input:focus { border-color: #007aff; background: #fff; box-shadow: 0 0 0 2px rgba(0,122,255,0.1); }
    
    .add-ip-link { font-size: 12px; color: #007aff; cursor: pointer; display: inline-block; margin-top: 6px; font-weight: 500;}
    .add-ip-link:hover { text-decoration: underline; }

    /* 左侧添加协议按钮 */
    .btn-add-protocol-left {
        width: 100%; padding: 12px; border: 1px dashed #007aff; border-radius: 8px;
        background: #f0f7ff; color: #007aff; font-size: 13px; font-weight: 600;
        cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-add-protocol-left:hover { background: #e0efff; }

    /* ================= 右侧协议配置面板 (占比提升至 440px) ================= */
    .edit-right-col { 
        flex: 1; padding: 25px 30px; display: none; flex-direction: column; background: #fff;
    }
    .edit-modal-card.has-content .edit-right-col { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 协议卡片 */
    .protocol-card {
        border: 1px solid #e5e5ea; border-radius: 10px; 
        background: #fff; margin-bottom: 12px;
        overflow: hidden; transition: all 0.2s;
    }
    .protocol-card:hover { border-color: #d1d1d6; }
    .protocol-card.disabled { opacity: 0.6; background: #f9f9fc; }

    /* [新增] 折叠交互样式 */
    .card-header-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 15px; background: #fafbfc; 
        cursor: pointer; user-select: none; transition: background 0.2s;
    }
    .card-header-row:hover { background: #f0f0f5; }
    
    .protocol-card.expanded .card-header-row { border-bottom: 1px solid #f0f0f5; }
    .protocol-card.disabled:not(.expanded) .card-header-row { border-bottom: none; }

    .expand-chevron {
        transition: transform 0.3s; color: #888; margin-right: 6px; 
        display: flex; align-items: center; justify-content: center;
    }
    .protocol-card.expanded .expand-chevron { transform: rotate(180deg); color: #007aff; }

    .protocol-tag { font-size: 14px; font-weight: 700; color: #1d1d1f; text-transform: uppercase; }
    .card-actions { display: flex; align-items: center; gap: 12px; }

    /* 开关组件 */
    .toggle-switch { position: relative; width: 34px; height: 18px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
        position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
        background-color: #e5e5ea; transition: .3s; border-radius: 18px;
    }
    .toggle-slider:before {
        position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px;
        background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    input:checked + .toggle-slider { background-color: #34c759; } 
    input:checked + .toggle-slider:before { transform: translateX(16px); }

    /* 删除按钮 */
    .btn-delete-text {
        border: none; background: transparent; color: #86868b; 
        font-size: 12px; font-weight: 600; cursor: pointer; 
        transition: all 0.2s; padding: 4px 8px; border-radius: 6px;
    }
    .btn-delete-text:hover { color: #d74242; background: rgba(215, 66, 66, 0.08); }
    .btn-delete-text.confirm-state { color: #fff; background: #d74242; }

    /* 链接输入框 */
    .card-body-row { padding: 0; display: none; } /* 默认折叠隐藏 */
    .protocol-card.expanded .card-body-row { display: block; } /* 展开时显示 */
    
    .protocol-textarea {
        width: 100%; border: none; padding: 12px 15px; 
        font-size: 12px; line-height: 1.5; color: #333;
        font-family: Menlo, Monaco, "Courier New", monospace; 
        background: transparent; outline: none;
        resize: none; overflow: hidden; min-height: 60px;
        white-space: pre-wrap; word-break: break-all; overflow-wrap: break-word;
    }
    .protocol-textarea:focus { background: #fff; }

    /* ================= 底部操作栏 ================= */
    .edit-footer { 
        padding: 15px 25px; border-top: 1px solid #eee; background: #fff;
        display: flex; justify-content: flex-end; gap: 12px; z-index: 5;
    }
    .btn-footer-cancel {
        background: #f5f5f7; border: none; color: #333;
        padding: 9px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-footer-cancel:hover { background: #e5e5ea; }
    .btn-footer-save {
        background: #007aff; border: none; color: white;
        padding: 9px 22px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-footer-save:hover { background: #0062cc; }

    /* 移动端响应式 */
    @media (max-width: 768px) {
        .edit-modal-card { max-width: 95%; height: 85vh; }
        .edit-modal-card.has-content { max-width: 95%; }
        .edit-body { flex-direction: column; overflow-y: auto; display: block; }
        .edit-left-col { width: 100%; height: auto; border-right: none; padding: 20px; overflow: visible; }
        .edit-right-col { width: 100%; height: auto; padding: 20px; border-top: 1px dashed #eee; overflow: visible;}
    }
</style>

<div class="edit-modal-overlay" id="editNodeModal">
    <div class="edit-modal-card" id="editModalCard">
        
        <div class="edit-header">
            <div class="edit-title">编辑节点配置</div>
        </div>
        
        <form id="editNodeForm" class="edit-form-wrapper" onsubmit="submitEditNode(event)">
            <input type="hidden" id="editNodeUUID">
            
            <div class="edit-body no-scrollbar">
                <div class="edit-left-col no-scrollbar">
                    <div class="edit-section">
                        <label class="section-label">节点名称</label>
                        <input type="text" id="editNodeName" class="title-input" placeholder="例如：独角鲸-香港" required>
                    </div>

                    <div class="edit-section">
                        <label class="section-label">路由类型</label>
                        <div class="segmented-control">
                            <div class="segment-option" data-type="1" onclick="selectEditGroup(1)">直连</div>
                            <div class="segment-option" data-type="2" onclick="selectEditGroup(2)">落地</div>
                            <div class="segment-option" data-type="3" onclick="selectEditGroup(3)">屏蔽</div>
                        </div>
                        <input type="hidden" id="editNodeUIState">
                    </div>

                    <div id="ipEditContainer"></div>

                    <div class="edit-section" style="margin-top: 30px;">
                        <label class="section-label">包含的代理协议</label>
                        <button type="button" class="btn-add-protocol-left" onclick="showAddProtocolMenu()">
                            <span>+</span> 添加协议
                        </button>
                    </div>
                </div>

                <div class="edit-right-col no-scrollbar">
                    <div id="protocolRowsContainer">
                        </div>
                </div>
            </div>

            <div class="edit-footer">
                <button type="button" class="btn-footer-cancel" onclick="closeEditModal()">取消</button>
                <button type="submit" class="btn-footer-save">保存更改</button>
            </div>
        </form>
    </div>
</div>

<div id="protoSelectOverlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; z-index: 3100; justify-content:center; align-items:center; background:rgba(0,0,0,0.05);" onclick="this.style.display='none'">
    <div id="protoSelectList" style="background:white; padding:10px; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.2); border: 1px solid #eee; width: 200px; display:flex; flex-direction:column; gap:4px; animation: fadeIn 0.15s;" onclick="event.stopPropagation()">
    </div>
</div>

<script>
    const editModalEl = document.getElementById('editNodeModal');
    const editModalCard = document.getElementById('editModalCard');
    const container = document.getElementById('protocolRowsContainer');
    let originalRoutingType = 1; 

    function openEditModal(uuid) {
        const node = window.allNodesData[uuid];
        if (!node) { alert('数据加载异常，请刷新'); return; }

        document.getElementById('editNodeUUID').value = node.uuid;
        document.getElementById('editNodeName').value = node.name;
        
        if (!node.is_blocked) {
            originalRoutingType = node.routing_type;
        } else {
            originalRoutingType = node.routing_type || 1;
        }
        let uiState = node.is_blocked ? 3 : node.routing_type;
        selectEditGroup(uiState);

        renderIPInputs(node.ipv4, node.ipv6);

        container.innerHTML = ''; 
        const disabledSet = new Set(node.disabled_links || []);

        if (node.links && Object.keys(node.links).length > 0) {
            for (const [proto, link] of Object.entries(node.links)) {
                const isEnabled = !disabledSet.has(proto);
                // 默认加载时不展开 (isNew = false)
                renderProtocolCard(proto, link, isEnabled, false);
            }
        }
        
        updateLayoutState();
        editModalEl.classList.add('active');
    }

    function renderIPInputs(ipv4, ipv6) {
        const ipContainer = document.getElementById('ipEditContainer');
        const v4 = ipv4 || '';
        const v6 = ipv6 || '';
        let html = '';

        const v4Html = `
            <div class="edit-section" id="section-ipv4" style="margin-bottom: 15px;">
                <label class="section-label">IPv4 地址</label>
                <input type="text" id="editNodeIPV4" class="ip-input" value="${v4}" placeholder="x.x.x.x">
            </div>`;
            
        const v6Html = `
            <div class="edit-section" id="section-ipv6" style="margin-bottom: 15px;">
                <label class="section-label">IPv6 地址</label>
                <input type="text" id="editNodeIPV6" class="ip-input" value="${v6}" placeholder="::1">
            </div>`;

        if (v4 && v6) {
            html = v4Html + v6Html;
        } else if ((v4 && !v6) || (!v4 && !v6)) {
            html = v4Html + `<div style="text-align:right; margin-top:-10px;"><a class="add-ip-link" onclick="appendIPField('v6')">+ 补充 IPv6</a></div>`;
        } else if (!v4 && v6) {
            html = v6Html + `<div style="text-align:right; margin-top:-10px;"><a class="add-ip-link" onclick="appendIPField('v4')">+ 补充 IPv4</a></div>`;
        }
        ipContainer.innerHTML = html;
    }

    function appendIPField(type) {
        const ipContainer = document.getElementById('ipEditContainer');
        const links = ipContainer.querySelectorAll('.add-ip-link');
        links.forEach(l => l.parentElement.remove()); 

        if (type === 'v6' && !document.getElementById('editNodeIPV6')) {
            const v6Html = `
                <div class="edit-section" id="section-ipv6" style="margin-bottom: 15px; animation: fadeIn 0.3s;">
                    <label class="section-label">IPv6 地址</label>
                    <input type="text" id="editNodeIPV6" class="ip-input" value="" placeholder="::1">
                </div>`;
            ipContainer.insertAdjacentHTML('beforeend', v6Html);
        } else if (type === 'v4' && !document.getElementById('editNodeIPV4')) {
             const v4Html = `
                <div class="edit-section" id="section-ipv4" style="margin-bottom: 15px; animation: fadeIn 0.3s;">
                    <label class="section-label">IPv4 地址</label>
                    <input type="text" id="editNodeIPV4" class="ip-input" value="" placeholder="x.x.x.x">
                </div>`;
            ipContainer.insertAdjacentHTML('afterbegin', v4Html);
        }
    }

    function closeEditModal() {
        editModalEl.classList.remove('active');
        setTimeout(() => { editModalCard.classList.remove('has-content'); }, 300);
    }

    function updateLayoutState() {
        if (container.children.length > 0) {
            editModalCard.classList.add('has-content');
        } else {
            editModalCard.classList.remove('has-content');
        }
    }

    function selectEditGroup(val) {
        document.getElementById('editNodeUIState').value = val;
        document.querySelectorAll('.segment-option').forEach(el => {
            el.classList.remove('active');
            if (parseInt(el.getAttribute('data-type')) === val) el.classList.add('active');
        });
        if (val === 1 || val === 2) originalRoutingType = val;
    }

    function autoResizeTextarea(el) {
        el.style.height = 'auto'; 
        el.style.height = (el.scrollHeight) + 'px';
    }

    function showAddProtocolMenu() {
        const listEl = document.getElementById('protoSelectList');
        listEl.innerHTML = '<div style="font-size:11px; color:#999; margin-bottom:6px; padding-left:6px; font-weight: 600;">选择协议类型</div>';
        
        const existingProtos = new Set();
        container.querySelectorAll('.protocol-card').forEach(card => {
            existingProtos.add(card.getAttribute('data-proto'));
        });

        const availableProtos = GLOBAL_SUPPORTED_PROTOCOLS.filter(p => !existingProtos.has(p));

        if (availableProtos.length === 0) {
            alert('所有支持的协议均已添加');
            return;
        }

        availableProtos.forEach(proto => {
            const item = document.createElement('div');
            item.innerText = proto.toUpperCase();
            item.style.padding = '8px 12px';
            item.style.cursor = 'pointer';
            item.style.borderRadius = '6px';
            item.style.fontSize = '13px';
            item.style.fontWeight = '600';
            item.style.color = '#333';
            item.onmouseover = () => item.style.background = '#f0f7ff';
            item.onmouseout = () => item.style.background = 'white';
            item.onclick = () => {
                insertProtocolCard(proto);
                document.getElementById('protoSelectOverlay').style.display = 'none';
            };
            listEl.appendChild(item);
        });

        document.getElementById('protoSelectOverlay').style.display = 'flex';
    }

    function insertProtocolCard(proto) {
        // 新增的协议自动展开 (isNew = true)
        renderProtocolCard(proto, '', true, true);
        updateLayoutState();
    }

    // 渲染卡片：增加 isNew 参数控制是否默认展开
    function renderProtocolCard(proto, linkValue, isEnabled, isNew = false) {
        const div = document.createElement('div');
        div.className = `protocol-card ${isEnabled ? '' : 'disabled'} ${isNew ? 'expanded' : ''}`;
        div.setAttribute('data-proto', proto);

        const checkedAttr = isEnabled ? 'checked' : '';
        const safeValue = linkValue ? linkValue.trim() : '';

        div.innerHTML = `
            <div class="card-header-row" onclick="toggleCardExpand(this)">
                <div style="display: flex; align-items: center;">
                    <div class="expand-chevron">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    <span class="protocol-tag">${proto}</span>
                </div>
                <div class="card-actions" onclick="event.stopPropagation()">
                    <label class="toggle-switch">
                        <input type="checkbox" class="proto-enable-check" ${checkedAttr} onchange="toggleCardState(this)">
                        <span class="toggle-slider"></span>
                    </label>
                    <button type="button" class="btn-delete-text" onclick="handleDeleteClick(this)">删除</button>
                </div>
            </div>
            <div class="card-body-row">
                <textarea class="protocol-textarea" 
                          oninput="autoResizeTextarea(this)"
                          placeholder="请粘贴 ${proto}:// 节点链接..." spellcheck="false">${safeValue}</textarea>
            </div>
        `;
        container.appendChild(div);
        
        // 如果初始状态是展开的，延迟触发一次高度自适应
        if (isNew) {
             setTimeout(() => {
                const textarea = div.querySelector('textarea');
                autoResizeTextarea(textarea);
             }, 10);
        }
    }

    // 折叠/展开点击逻辑
    window.toggleCardExpand = function(headerEl) {
        const card = headerEl.closest('.protocol-card');
        card.classList.toggle('expanded');
        // 展开时计算文本框高度
        if (card.classList.contains('expanded')) {
            const textarea = card.querySelector('textarea');
            autoResizeTextarea(textarea);
        }
    }

    window.toggleCardState = function(checkbox) {
        const card = checkbox.closest('.protocol-card');
        if (checkbox.checked) {
            card.classList.remove('disabled');
        } else {
            card.classList.add('disabled');
        }
    }

    window.handleDeleteClick = function(btn) {
        if (btn.dataset.confirmState === 'true') {
            btn.closest('.protocol-card').remove();
            updateLayoutState();
        } else {
            btn.dataset.confirmState = 'true';
            btn.innerText = '确认删除?';
            btn.classList.add('confirm-state');
            
            btn.resetTimer = setTimeout(() => {
                btn.dataset.confirmState = 'false';
                btn.innerText = '删除';
                btn.classList.remove('confirm-state');
            }, 2500);
        }
    }

    async function submitEditNode(e) {
        if(e) e.preventDefault();
        
        const uuid = document.getElementById('editNodeUUID').value;
        const name = document.getElementById('editNodeName').value;
        const uiState = parseInt(document.getElementById('editNodeUIState').value);
        
        const v4El = document.getElementById('editNodeIPV4');
        const v6El = document.getElementById('editNodeIPV6');
        const ipv4 = v4El ? v4El.value.trim() : "";
        const ipv6 = v6El ? v6El.value.trim() : "";

        let finalRoutingType = 1;
        let finalIsBlocked = false;
        if (uiState === 3) {
            finalIsBlocked = true;
            finalRoutingType = originalRoutingType; 
        } else {
            finalIsBlocked = false;
            finalRoutingType = uiState;
        }
        
        const links = {};
        const disabledLinks = []; 

        const cards = container.querySelectorAll('.protocol-card');
        cards.forEach(card => {
            const proto = card.getAttribute('data-proto');
            const input = card.querySelector('.protocol-textarea');
            const toggle = card.querySelector('.proto-enable-check');
            
            const linkVal = input.value.trim();
            if (linkVal) {
                links[proto] = linkVal; 
                if (!toggle.checked) {
                    disabledLinks.push(proto);
                }
            }
        });

        const btnSave = document.querySelector('.btn-footer-save');
        const oldText = btnSave.innerText;
        btnSave.innerText = "保存中...";
        btnSave.disabled = true;

        try {
            const response = await fetch('/api/update-node', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    uuid, name, 
                    routing_type: finalRoutingType, 
                    links, 
                    is_blocked: finalIsBlocked,
                    disabled_links: disabledLinks,
                    ipv4, ipv6 
                })
            });
            const res = await response.json();
            
            if (res.status === 'success') {
                closeEditModal();
                loadNodesList(); 
            } else {
                alert('保存失败: ' + res.message);
            }
        } catch (err) {
            alert('网络请求错误');
        } finally {
            btnSave.innerText = oldText;
            btnSave.disabled = false;
        }
    }
</script>
{{end}}
