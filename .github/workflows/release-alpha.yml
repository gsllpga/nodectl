name: Build, Release and Publish Docker (Alpha)

# 触发条件：手动触发 (workflow_dispatch) - 仅针对 nodectl-Alpha 分支
on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号（alpha 后缀将自动添加）'
        required: true
        default: 'v0.4.0'
      agent_version:
        description: 'Agent 版本号（alpha 后缀将自动添加）'
        required: true
        default: 'v0.2.0'

permissions:
  contents: write
  packages: write

jobs:
  # ==========================================
  # 阶段 1: 交叉编译 Go 二进制文件并注入版本号
  # ==========================================
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: windows
            goarch: arm64
            ext: '.exe'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: nodectl-Alpha

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true # 开启缓存以加速依赖下载和编译

      - name: Build Binary
        env:
          CGO_ENABLED: 0 
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          # Alpha 版本号添加 -alpha 后缀
          ALPHA_VERSION="${{ github.event.inputs.version }}-alpha"
          # 动态注入版本号到 internal/version.Version 变量中
          go build -trimpath -ldflags="-s -w -X 'nodectl/internal/version.Version=${ALPHA_VERSION}'" -o bin/nodectl-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/nodectl-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # ==========================================
  # 阶段 1b: 交叉编译 Agent 二进制文件
  # ==========================================
  build-agent:
    name: Build Agent Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: nodectl-Alpha

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build Agent Binary
        env:
          CGO_ENABLED: 0 
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          # Alpha 版本号添加 -alpha 后缀
          AGENT_VERSION="${{ github.event.inputs.agent_version || github.event.inputs.version }}-alpha"
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          go build -trimpath -ldflags="-s -w \
            -X 'nodectl/internal/agent.AgentVersion=${AGENT_VERSION}' \
            -X 'nodectl/internal/agent.GitCommit=${GIT_SHA}' \
            -X 'nodectl/internal/agent.BuildTime=${BUILD_TIME}'" \
            -o bin/nodectl-agent-${{ matrix.goos }}-${{ matrix.goarch }}-${AGENT_VERSION} \
            ./cmd/nodectl-agent/main.go

      - name: Generate Agent SHA256
        run: |
          cd bin
          for f in nodectl-agent-*; do sha256sum "$f" > "${f}.sha256"; done

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-${{ matrix.goarch }}
          path: bin/nodectl-agent-*

  # ==========================================
  # 阶段 2: 发布到 GitHub Releases (Pre-release)
  # ==========================================
  release:
    name: Create GitHub Release (Pre-release)
    needs: [build, build-agent]
    runs-on: ubuntu-latest
    steps:
      - name: Download all compiled binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: bin
          merge-multiple: true

      - name: Download all agent binaries
        uses: actions/download-artifact@v4
        with:
          pattern: agent-binary-*
          path: bin
          merge-multiple: true

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-alpha
          name: Alpha Release ${{ github.event.inputs.version }}-alpha
          prerelease: true
          files: bin/*
          generate_release_notes: true

  # ==========================================
  # 阶段 3: 打包并推送到 GitHub Packages (GHCR)
  # Docker 镜像标签固定为 alpha，不推送 latest
  # ==========================================
  docker:
    name: Build and Push Docker Image (Alpha)
    needs: build # 优化：改为依赖 build，与 release 任务并行执行
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: nodectl-Alpha

      - name: Download all compiled binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-linux-*
          path: bin
          merge-multiple: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用自带的 TOKEN，免配置

      - name: Convert Repository Name to Lowercase
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: . 
          file: .github/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Alpha 版本仅推送 alpha 标签，不覆盖 latest
          tags: |
            ghcr.io/${{ env.REPO_LC }}:alpha
          # 添加 OCI 标签，向 GHCR 声明此镜像与本仓库绑定，从而放行 GITHUB_TOKEN 写入权限
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}