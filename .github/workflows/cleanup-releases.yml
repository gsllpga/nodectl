name: Cleanup Releases and Packages

on:
  schedule:
    # 每天北京时间早上 8:00 (UTC 0:00) 自动执行
    - cron: '0 0 * * *' 
  workflow_dispatch: # 允许在 Actions 页面手动触发测试

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许删除 Release 和 Git Tag
      packages: write  # 允许删除 GHCR 中的 Docker 镜像

    steps:
      # 阶段 1: 清理 GitHub Releases 和 Git Tags
      - name: Smart Delete Old Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "开始分析仓库的历史版本..."
          
          # ------------------------------------------
          # 1. 处理预览版 (Alpha) - 目标保留: 3
          # ------------------------------------------
          echo "=== 分析预览版 (目标保留: 3) ==="
          ALPHA_TAGS=$(gh release list --limit 1000 --json tagName,isPrerelease -q 'map(select(.isPrerelease)) | .[].tagName')
          ALPHA_COUNT=$(echo "$ALPHA_TAGS" | wc -w)
          
          if [ "$ALPHA_COUNT" -gt 3 ]; then
            ALPHA_TO_DELETE=$(echo "$ALPHA_TAGS" | tr ' ' '\n' | tail -n +4)
            for tag in $ALPHA_TO_DELETE; do
              echo "  -> 🗑️ 正在删除预览版及底层 Tag: $tag"
              # 添加 || true 防止由于个别 tag 异常导致整个脚本中断
              gh release delete "$tag" --cleanup-tag --yes || true
            done
          else
             echo "  -> ✅ 预览版数量合规 ($ALPHA_COUNT/3)，无需清理。"
          fi

          echo ""

          # ------------------------------------------
          # 2. 处理正式版 (Main) - 目标保留: 6
          # ------------------------------------------
          echo "=== 分析正式版 (目标保留: 6) ==="
          MAIN_TAGS=$(gh release list --limit 1000 --json tagName,isPrerelease -q 'map(select(.isPrerelease | not)) | .[].tagName')
          MAIN_COUNT=$(echo "$MAIN_TAGS" | wc -w)
          
          if [ "$MAIN_COUNT" -gt 6 ]; then
            MAIN_TO_DELETE=$(echo "$MAIN_TAGS" | tr ' ' '\n' | tail -n +7)
            for tag in $MAIN_TO_DELETE; do
              echo "  -> 🗑️ 正在删除正式版及底层 Tag: $tag"
              gh release delete "$tag" --cleanup-tag --yes || true
            done
          else
            echo "  -> ✅ 正式版数量合规 ($MAIN_COUNT/6)，无需清理。"
          fi

      # ==========================================
      # 阶段 2: 清理 GitHub Packages (Docker 镜像)
      # ==========================================
      
      # 步骤 2.1: 清理 Alpha 分支反复构建产生的无标签(Untagged)残留镜像
      - name: Delete untagged Docker images (Alpha leftovers)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'nodectl' # 严格匹配你的 GitHub 仓库小写名称
          package-type: 'container'
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}

      # 步骤 2.2: 清理旧的正式版镜像，仅保留最近的 6 个
      - name: Delete old tagged Docker images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'nodectl' # 严格匹配你的 GitHub 仓库小写名称
          package-type: 'container'
          min-versions-to-keep: 6
          # 使用正则保护 active 状态的核心标签 (alpha 和 latest) 不被误删
          ignore-versions: '^(alpha|latest)$' 
          token: ${{ secrets.GITHUB_TOKEN }}