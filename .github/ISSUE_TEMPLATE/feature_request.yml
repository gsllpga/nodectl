name: "功能建议"
description: "提出一个新功能或改进建议"
title: "[建议] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出建议！请尽可能详细地描述你的想法，这将帮助我们更好地理解你的需求。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请清晰地描述你希望添加或改进的功能
      placeholder: 描述你期望的功能...
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 为什么需要这个功能？
      description: 请说明这个功能能解决什么问题，或者带来什么好处
      placeholder: 这个功能可以帮助我...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的实现方式
      description: 如果你有具体的实现思路，请在这里描述
      placeholder: 我认为可以这样实现...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？
      placeholder: 目前我通过以下方式解决...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他相关的截图、链接或上下文信息
    validations:
      required: false
